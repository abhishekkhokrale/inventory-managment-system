services:

  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: kitchen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kitchen_inventory
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Fidel@123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d kitchen_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kitchen-network

  # ============================================================
  # Spring Boot Backend
  # ============================================================
  inventory-backend:
    build:
      context: ./inventory-backend
      dockerfile: Dockerfile
    container_name: kitchen-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kitchen_inventory
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Fidel@123}
      JWT_SECRET: ${JWT_SECRET:-5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://inventory-frontend
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - kitchen-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ============================================================
  # React Frontend
  # ============================================================
  inventory-frontend:
    build:
      context: ./inventory-frontend
      dockerfile: Dockerfile
    container_name: kitchen-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      inventory-backend:
        condition: service_healthy
    networks:
      - kitchen-network

  # ============================================================
  # PgAdmin (Development Only)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kitchen-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kitchen.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev
    networks:
      - kitchen-network

volumes:
  postgres_data:
  backend_uploads:
  backend_logs:

networks:
  kitchen-network:
    driver: bridge
